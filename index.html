// ===== AIRPORTS CSV PARSER & FETCHER =====

// Reusing your robust hotel CSV parser logic
function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    
    // Normalize headers (handles the 'aiport' typo in your CSV header)
    const headers = lines[0].split(',').map(h => 
        h.trim().toLowerCase().replace(/[^\w]/g, '')
    );

    // We only need these columns (ignoring lat/long as requested)
    const neededColumns = ['city', 'airport', 'aiport', 'country', 'iatacode', 'latitude', 'longitude'];
    
    const parsedData = [];
    
    for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        if (!line.trim()) continue;

        const values = [];
        let inQuotes = false, current = '';
        
        for (let char of line) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
            else current += char;
        }
        values.push(current.trim());

        const obj = {};
        neededColumns.forEach(col => {
            const idx = headers.indexOf(col);
            obj[col] = (idx !== -1 && idx < values.length) ? values[idx] : '';
        });

        if (obj.city) parsedData.push(obj);
    }
    return parsedData;
}

    async function downloadPDF() {
        const fullText = buildExactTicket();
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        
        // 🎯 UPDATED: Increased font size and adjusted margins for a professional look
        doc.setFont('courier', 'normal');
        doc.setFontSize(9); // Increased from 8pt to 9pt

        const marginLeft = 10; // Increased from 8mm
        const marginTop = 12;  // Increased from 10mm
        const lineHeight = 4.2; // Increased from 3.6mm for better breathing room
        const pageHeight = doc.internal.pageSize.getHeight();
        const maxChars = 115; // 🎯 UPDATED: Increased from 95 to stretch text to the right margin

        let y = marginTop;

        // 🎯 NEW: Helper function to prevent orphaned headers
        function checkPage(linesNeeded) {
            // If the remaining space on the page is less than the lines needed, start a new page
            if (y + (linesNeeded * lineHeight) > pageHeight - 15) {
                doc.addPage();
                y = marginTop;
            }
        }

        const lines = fullText.split('\n');

        // 🎯 CHANGED: Moved from 190 to 185. This increases the right white space to 2.5 cm.
        // (If you want 3 cm, change this number to 180)
        const rightAlignX = 180; 
		
        lines.forEach(line => {
            // 🎯 NEW: Trigger page checks right before specific sections
            if (line.trim() === 'FLIGHT TICKET(S)') {
                checkPage(5); 
            }
            if (line.startsWith('Data Protection Notice:')) {
                checkPage(10); 
            }

            // Safety net: if we somehow exceed the page height, force a new page
            if (line.length > 0 && y > pageHeight - 15) {
                doc.addPage();
                y = marginTop;
            }

            // Reset colors to black for every new line by default
            doc.setTextColor(0, 0, 0);

            // 🎯 1. HANDLE THE "SPLIT" (Left and Right alignment)
            if (line.includes('|||')) {
                const parts = line.split('|||');
                const leftText = parts[0];
                const rightText = parts[1].trim();

                // Draw left side at the left margin
                doc.text(leftText, marginLeft, y);
                
                // Draw right side glued to the right margin
                doc.text(rightText, rightAlignX, y, { align: 'right' });
                
                y += lineHeight;
                return; // Skip to the next line
            }

            // 🎯 2. STANDARD TEXT RENDERING (For everything else including dashes)
            if (line.trim() === 'https://www.icao.int/environmental-protection/CarbonOffset/Pages/default.aspx') {
                doc.setTextColor(0, 0, 255); 
                doc.text(line, marginLeft, y);
                const textWidth = doc.getTextWidth(line);
                doc.setDrawColor(0, 0, 255); 
                doc.line(marginLeft, y + 1, marginLeft + textWidth, y + 1); 
                y += lineHeight;
            } 
            else if (line.length <= maxChars) {
                doc.text(line, marginLeft, y);
                y += lineHeight;
            } else {
                // Word wrap long lines
                const words = line.split(' ');
                let currentLine = '';
                words.forEach(word => {
                    const testLine = currentLine + (currentLine ? ' ' : '') + word;
                    if (testLine.length <= maxChars) {
                        currentLine = testLine;
                    } else {
                        doc.text(currentLine, marginLeft, y);
                        y += lineHeight;
                        currentLine = word;
                    }
                });
                if (currentLine) {
                    doc.text(currentLine, marginLeft, y);
                    y += lineHeight;
                }
            }
        });

        doc.save(`Flight_${(out1Flight.value || 'TK')}_${randomBookingRef()}.pdf`);
    }

// ===== AIRLINE AUTOCOMPLETE LOGIC =====
function setupAirlineAutocomplete(inputId) {
    const input = document.getElementById(inputId);
    const list = document.createElement('div');
    list.className = 'autocomplete-list';
    input.parentNode.appendChild(list);

    input.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        list.innerHTML = '';
        
        // Only show dropdown if user types 2 or more characters
        if (query.length < 2) {
            list.style.display = 'none';
            return;
        }

        // Filter airlines by Name, Code, or Country
        const matches = AIRLINES.filter(airline =>
            airline.name.toLowerCase().includes(query) ||
            airline.code.toLowerCase().includes(query) ||
            airline.country.toLowerCase().includes(query)
        );

        if (matches.length > 0) {
            matches.forEach(airline => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.innerHTML = `<strong>${airline.code}</strong> - ${airline.name} <span style="color:#64748b; font-size:0.75rem;">(${airline.country})</span>`;
                
                item.addEventListener('click', () => {
                    input.value = airline.name; // Auto-fill the input
                    list.style.display = 'none'; // Hide dropdown
                    updatePreview(); // Update the ticket preview immediately
                });
                list.appendChild(item);
            });
            list.style.display = 'block';
        } else {
            list.style.display = 'none';
        }
    });

    // Close dropdown when clicking anywhere outside
    document.addEventListener('click', (e) => {
        if (!input.parentNode.contains(e.target)) {
            list.style.display = 'none';
        }
    });
}

// ===== AIRPORT AUTOCOMPLETE LOGIC =====
function setupAirportAutocomplete(inputId) {
    const input = document.getElementById(inputId);
    const list = document.createElement('div');
    list.className = 'autocomplete-list';
    input.parentNode.appendChild(list);

    input.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();
        list.innerHTML = '';
        
        if (query.length < 2) {
            list.style.display = 'none';
            return;
        }

        // Filter by City, Airport Name (handles 'airport' and 'aiport' typo), or IATA Code
        const matches = allAirports.filter(ap =>
            (ap.city && ap.city.toLowerCase().includes(query)) ||
            (ap.airport && ap.airport.toLowerCase().includes(query)) ||
            (ap.aiport && ap.aiport.toLowerCase().includes(query)) ||
            (ap.iatacode && ap.iatacode.toLowerCase().includes(query))
        ).slice(0, 15); // Limit to 15 results to keep the dropdown clean

        if (matches.length > 0) {
            matches.forEach(ap => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                const airportName = ap.airport || ap.aiport || '';
                item.innerHTML = `<strong>${ap.iatacode || ''}</strong> - ${ap.city}, ${ap.country} <span style="color:#64748b; font-size:0.75rem;">(${airportName})</span>`;
                
                item.addEventListener('click', () => {
                    // Format the string to match your ticket style: CITY, COUNTRY(AIRPORT NAME)
                    const cityName = (ap.city || '').toUpperCase();
                    const countryName = (ap.country || '').toUpperCase();
                    const aptName = (airportName || '').toUpperCase();
                    
                    input.value = `${cityName}, ${countryName} (${aptName})`;
                    list.style.display = 'none';
                    
                    // 🎯 CRITICAL: Trigger syncFields() so the auto-filled legs update instantly!
                    syncFields(); 
                    updatePreview();
                });
                list.appendChild(item);
            });
            list.style.display = 'block';
        } else {
            list.style.display = 'none';
        }
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
        if (!input.parentNode.contains(e.target)) {
            list.style.display = 'none';
        }
    });
}
